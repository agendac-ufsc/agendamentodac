<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agendamento</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .calendar {
            margin: 20px 0;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }

        .calendar-header button:hover {
            background: #5568d3;
        }

        .calendar-header h3 {
            color: #333;
            font-size: 18px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            padding: 10px 0;
            font-size: 12px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            cursor: pointer;
            background: white;
            transition: all 0.3s;
            font-size: 14px;
        }

        .day:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .day.other-month {
            color: #ccc;
            background: #fafafa;
            cursor: not-allowed;
        }

        .day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .time-slots {
            margin: 20px 0;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        @media (min-width: 600px) {
            .time-slots {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .time-slot {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: white;
        }

        .time-slot:hover {
            border-color: #667eea;
            background: #f0f4ff;
        }

        .time-slot.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        button.submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        button.submit:hover {
            transform: translateY(-2px);
        }

        button.submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 20px;
        }

        .loading.show {
            display: block;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            color: #764ba2;
            margin-bottom: 10px;
            font-size: 22px;
        }

        .modal-content p {
            color: #666;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .modal-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }

        .modal-btn:hover {
            background: #764ba2;
        }

        /* Summary Styles */
        .summary-card {
            background: #f0f4ff;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            display: none;
            flex-direction: column;
            gap: 10px;
        }

        .summary-card.show {
            display: flex;
        }

        .summary-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #667eea;
            padding-bottom: 10px;
            margin-bottom: 5px;
        }

        .summary-header h4 {
            color: #333;
            font-size: 16px;
        }

        .summary-details {
            font-size: 15px;
            color: #555;
            line-height: 1.6;
        }

        .delete-btn {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
            transition: background 0.3s;
        }

        .delete-btn:hover {
            background: #cc0000;
        }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2>Horário de início confirmado!</h2>
            <p>Agora clique no OK para escolher o horário de término no seletor.</p>
            <button type="button" class="modal-btn" id="modalOkBtn">OK</button>
        </div>
    </div>

    <div class="container">
        <h1>📅 Agende seu Horário</h1>

        <form id="agendamentoForm">
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone *</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>

            <div class="calendar">
                <div class="calendar-header">
                    <button type="button" id="prevMonth">← Anterior</button>
                    <h3 id="monthYear"></h3>
                    <button type="button" id="nextMonth">Próximo →</button>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
            </div>

            <div class="form-group">
                <label>Data Selecionada: <strong id="selectedDate">Nenhuma</strong></label>
            </div>

            <div class="form-group">
                <label>Horário *</label>
                <div class="time-slots" id="timeSlots"></div>
            </div>

            <div class="summary-card" id="summaryCard">
                <div class="summary-header">
                    <h4>Resumo da Seleção</h4>
                    <button type="button" class="delete-btn" id="deleteSelectionBtn">Excluir Seleção</button>
                </div>
                <div class="summary-details" id="summaryDetails">
                    <!-- Preenchido via JS -->
                </div>
            </div>

            <div class="loading" id="loading">
                <p>Processando seu agendamento...</p>
            </div>

            <button type="submit" class="submit" id="submitBtn">Confirmar Agendamento</button>

            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        let currentDate = new Date();
        let selectedDate = null;
        let startTime = null;
        let endTime = null;

        const monthYear = document.getElementById('monthYear');
        const calendarGrid = document.getElementById('calendarGrid');
        const timeSlots = document.getElementById('timeSlots');
        const form = document.getElementById('agendamentoForm');
        const message = document.getElementById('message');
        const loading = document.getElementById('loading');
        const selectedDateDisplay = document.getElementById('selectedDate');

        // Renderizar calendário
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            monthYear.textContent = new Date(year, month).toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            calendarGrid.innerHTML = '';

            // Cabeçalho dos dias da semana
            const dayHeaders = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                calendarGrid.appendChild(header);
            });

            // Dias do mês anterior
            for (let i = daysInPrevMonth - firstDay + 1; i <= daysInPrevMonth; i++) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.textContent = i;
                calendarGrid.appendChild(day);
            }

            // Dias do mês atual
            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('div');
                day.className = 'day';
                day.textContent = i;

                const date = new Date(year, month, i);
                const today = new Date();
                today.setHours(0, 0, 0, 0);

                if (date < today) {
                    day.classList.add('other-month');
                    day.style.cursor = 'not-allowed';
                } else {
                    day.addEventListener('click', () => selectDate(date));
                }

                if (selectedDate && date.toDateString() === selectedDate.toDateString()) {
                    day.classList.add('selected');
                }

                calendarGrid.appendChild(day);
            }

            // Dias do próximo mês
            const totalCells = calendarGrid.children.length - 7; // Menos cabeçalho
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const day = document.createElement('div');
                day.className = 'day other-month';
                day.textContent = i;
                calendarGrid.appendChild(day);
            }
        }

        function selectDate(date) {
            selectedDate = date;
            startTime = null;
            endTime = null;
            selectedDateDisplay.textContent = date.toLocaleDateString('pt-BR');
            updateSubmitButton();
            renderCalendar();
            renderTimeSlots();
        }

        function renderTimeSlots() {
            timeSlots.innerHTML = '';
            if (!selectedDate) return;

            const times = [];
            for (let hour = 8; hour <= 22; hour++) {
                const h = hour.toString().padStart(2, '0');
                times.push(`${h}:00`);
                if (hour < 22) {
                    times.push(`${h}:30`);
                }
            }

            times.forEach(time => {
                const slot = document.createElement('div');
                slot.className = 'time-slot';
                slot.textContent = time;
                
                if (startTime && time === startTime) slot.classList.add('selected');
                if (endTime && time === endTime) slot.classList.add('selected');
                
                // Desabilitar horários menores ou iguais ao início se já houver um início selecionado
                if (startTime && !endTime) {
                    const startVal = parseInt(startTime.replace(':', ''));
                    const currentVal = parseInt(time.replace(':', ''));
                    if (currentVal <= startVal) {
                        slot.style.opacity = '0.3';
                        slot.style.cursor = 'not-allowed';
                    } else {
                        slot.addEventListener('click', () => selectTime(time));
                    }
                } else {
                    slot.addEventListener('click', () => selectTime(time));
                }
                
                timeSlots.appendChild(slot);
            });
        }

        function selectTime(time) {
            if (!startTime || (startTime && endTime)) {
                // Iniciar nova seleção
                startTime = time;
                endTime = null;
                
                // Mostrar modal de orientação
                document.getElementById('modalOverlay').style.display = 'flex';
            } else {
                // Selecionar fim
                const startVal = parseInt(startTime.replace(':', ''));
                const endVal = parseInt(time.replace(':', ''));
                
                if (endVal > startVal) {
                    endTime = time;
                } else {
                    startTime = time;
                    endTime = null;
                }
            }
            updateSubmitButton();
            renderTimeSlots();
        }

        function updateSubmitButton() {
            const btn = document.getElementById('submitBtn');
            const summaryCard = document.getElementById('summaryCard');
            const summaryDetails = document.getElementById('summaryDetails');

            if (selectedDate && startTime && endTime) {
                btn.disabled = false;
                btn.textContent = `Confirmar Agendamento Final`;
                
                // Mostrar resumo
                summaryDetails.innerHTML = `
                    <p>📅 <strong>Data:</strong> ${selectedDate.toLocaleDateString('pt-BR')}</p>
                    <p>⏰ <strong>Horário:</strong> ${startTime} às ${endTime}</p>
                `;
                summaryCard.classList.add('show');
            } else if (selectedDate && startTime) {
                btn.disabled = true;
                btn.textContent = 'Selecione o Horário de Término';
                summaryCard.classList.remove('show');
            } else {
                btn.disabled = true;
                btn.textContent = 'Selecione Data e Horários';
                summaryCard.classList.remove('show');
            }
        }
                btn.disabled = true;
                btn.textContent = 'Selecione o Horário de Término';
            } else {
                btn.disabled = true;
                btn.textContent = 'Selecione Data e Horários';
            }
        }

        document.getElementById('prevMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', (e) => {
            e.preventDefault();
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedDate || !startTime || !endTime) {
                showMessage('Por favor, selecione uma data e os horários de início e término', 'error');
                return;
            }

            const nome = document.getElementById('nome').value;
            const email = document.getElementById('email').value;
            const telefone = document.getElementById('telefone').value;

            loading.classList.add('show');

            try {
                const response = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        nome,
                        email,
                        telefone,
                        data: selectedDate.toISOString().split('T')[0],
                        hora: `${startTime} às ${endTime}`
                    })
                });

                const result = await response.json();

                if (response.ok) {
                    showMessage('✅ Agendamento realizado com sucesso! Verifique seu e-mail.', 'success');
                    form.reset();
                    selectedDate = null;
                    startTime = null;
                    endTime = null;
                    selectedDateDisplay.textContent = 'Nenhuma';
                    updateSubmitButton();
                    renderCalendar();
                    timeSlots.innerHTML = '';
                } else {
                    showMessage('❌ Erro: ' + (result.error || 'Tente novamente'), 'error');
                }
            } catch (error) {
                showMessage('❌ Erro ao processar agendamento: ' + error.message, 'error');
            } finally {
                loading.classList.remove('show');
            }
        });

        function showMessage(text, type) {
            message.textContent = text;
            message.className = 'message ' + type;
            setTimeout(() => {
                message.className = 'message';
            }, 5000);
        }

        // Fechar modal
        document.getElementById('modalOkBtn').addEventListener('click', () => {
            document.getElementById('modalOverlay').style.display = 'none';
        });

        // Excluir seleção
        document.getElementById('deleteSelectionBtn').addEventListener('click', () => {
            startTime = null;
            endTime = null;
            updateSubmitButton();
            renderTimeSlots();
        });

        // Inicializar
        updateSubmitButton();
        renderCalendar();
    </script>
</body>
</html>

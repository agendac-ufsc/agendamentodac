<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Agendamento DAC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 800px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Accordion Styles */
        .accordion {
            margin: 20px 0;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .accordion-item {
            border-bottom: 1px solid #e0e0e0;
        }

        .accordion-item:last-child {
            border-bottom: none;
        }

        .accordion-header {
            background: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.3s;
            user-select: none;
        }

        .accordion-header:hover {
            background: #f8f9fa;
        }

        .accordion-header h3 {
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        .accordion-header .status-icon {
            font-size: 12px;
            color: #ccc;
            transition: transform 0.3s;
        }

        .accordion-header.active .status-icon {
            transform: rotate(180deg);
        }

        .accordion-header.completed h3::after {
            content: ' ✅';
            font-size: 14px;
        }

        .accordion-content {
            display: none;
            padding: 20px;
            background: #fcfcfc;
            border-top: 1px solid #eee;
        }

        .accordion-content.show {
            display: block;
        }

        /* Calendar & Time Slots Styles */
        .calendar {
            margin-bottom: 20px;
            padding: 15px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-header button {
            background: #667eea;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .day-header {
            text-align: center;
            font-weight: bold;
            color: #667eea;
            font-size: 11px;
            padding-bottom: 5px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .day:hover:not(.other-month) {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .day.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .day.other-month {
            color: #ccc;
            cursor: not-allowed;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-top: 15px;
        }

        @media (min-width: 600px) {
            .time-slots {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .time-slot {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }

        .time-slot:hover {
            background: #f0f4ff;
            border-color: #667eea;
        }

        .time-slot.selected {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        /* Summary & Buttons */
        .step-summary {
            margin-top: 15px;
            padding: 10px;
            background: #eef2ff;
            border-radius: 6px;
            font-size: 13px;
            display: none;
        }

        .step-summary.show {
            display: block;
        }

        .btn-clear {
            background: #ff4d4d;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-top: 10px;
        }

        button.submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 20px;
        }

        button.submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Modal & Messages */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .message {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }

        .loading { display: none; text-align: center; margin-top: 20px; color: #667eea; }
        .loading.show { display: block; }
    </style>
</head>
<body>
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <h2 style="color: #764ba2; margin-bottom: 10px;">Início confirmado!</h2>
            <p style="color: #666; margin-bottom: 20px;">Agora escolha o horário de término.</p>
            <button type="button" style="background:#667eea; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;" id="modalOkBtn">OK</button>
        </div>
    </div>

    <div class="container">
        <h1>📅 Inscrição de Projeto</h1>

        <form id="agendamentoForm">
            <div class="form-group">
                <label for="nome">Nome Completo *</label>
                <input type="text" id="nome" required>
            </div>
            <div class="form-group">
                <label for="email">E-mail *</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label for="telefone">Telefone *</label>
                <input type="tel" id="telefone" required>
            </div>
            <div class="form-group">
                <label for="evento">Nome do Evento *</label>
                <input type="text" id="evento" required>
            </div>

            <div class="accordion" id="stepsAccordion">
                <!-- Etapa: Ensaio -->
                <div class="accordion-item" data-step="ensaio">
                    <div class="accordion-header" onclick="toggleStep('ensaio')">
                        <h3>Ensaio</h3>
                        <span class="status-icon">▼</span>
                    </div>
                    <div class="accordion-content" id="content-ensaio">
                        <div class="calendar" id="calendar-ensaio"></div>
                        <div class="time-slots" id="slots-ensaio"></div>
                        <div class="step-summary" id="summary-ensaio"></div>
                        <button type="button" class="btn-clear" onclick="clearStep('ensaio')">Limpar Ensaio</button>
                    </div>
                </div>

                <!-- Etapa: Montagem -->
                <div class="accordion-item" data-step="montagem">
                    <div class="accordion-header" onclick="toggleStep('montagem')">
                        <h3>Montagem</h3>
                        <span class="status-icon">▼</span>
                    </div>
                    <div class="accordion-content" id="content-montagem">
                        <div class="calendar" id="calendar-montagem"></div>
                        <div class="time-slots" id="slots-montagem"></div>
                        <div class="step-summary" id="summary-montagem"></div>
                        <button type="button" class="btn-clear" onclick="clearStep('montagem')">Limpar Montagem</button>
                    </div>
                </div>

                <!-- Etapa: Evento -->
                <div class="accordion-item" data-step="evento">
                    <div class="accordion-header" onclick="toggleStep('evento')">
                        <h3>Evento</h3>
                        <span class="status-icon">▼</span>
                    </div>
                    <div class="accordion-content" id="content-evento">
                        <div class="calendar" id="calendar-evento"></div>
                        <div class="time-slots" id="slots-evento"></div>
                        <div class="step-summary" id="summary-evento"></div>
                        <button type="button" class="btn-clear" onclick="clearStep('evento')">Limpar Evento</button>
                    </div>
                </div>

                <!-- Etapa: Desmontagem -->
                <div class="accordion-item" data-step="desmontagem">
                    <div class="accordion-header" onclick="toggleStep('desmontagem')">
                        <h3>Desmontagem</h3>
                        <span class="status-icon">▼</span>
                    </div>
                    <div class="accordion-content" id="content-desmontagem">
                        <div class="calendar" id="calendar-desmontagem"></div>
                        <div class="time-slots" id="slots-desmontagem"></div>
                        <div class="step-summary" id="summary-desmontagem"></div>
                        <button type="button" class="btn-clear" onclick="clearStep('desmontagem')">Limpar Desmontagem</button>
                    </div>
                </div>
            </div>

            <div class="loading" id="loading">Processando agendamento...</div>
            <button type="submit" class="submit" id="submitBtn" disabled>Finalizar Inscrição</button>
            <div class="message" id="message"></div>
        </form>
    </div>

    <script>
        const steps = ['ensaio', 'montagem', 'evento', 'desmontagem'];
        const selections = {
            ensaio: { date: null, start: null, end: null, currentMonth: new Date() },
            montagem: { date: null, start: null, end: null, currentMonth: new Date() },
            evento: { date: null, start: null, end: null, currentMonth: new Date() },
            desmontagem: { date: null, start: null, end: null, currentMonth: new Date() }
        };

        function toggleStep(step) {
            steps.forEach(s => {
                const content = document.getElementById(`content-${s}`);
                const header = content.previousElementSibling;
                if (s === step) {
                    const isShowing = content.classList.contains('show');
                    content.classList.toggle('show', !isShowing);
                    header.classList.toggle('active', !isShowing);
                    if (!isShowing) renderStepCalendar(s);
                } else {
                    content.classList.remove('show');
                    header.classList.remove('active');
                }
            });
        }

        function renderStepCalendar(step) {
            const container = document.getElementById(`calendar-${step}`);
            const sel = selections[step];
            const year = sel.currentMonth.getFullYear();
            const month = sel.currentMonth.getMonth();

            container.innerHTML = `
                <div class="calendar-header">
                    <button type="button" onclick="changeMonth('${step}', -1)">←</button>
                    <span>${sel.currentMonth.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' })}</span>
                    <button type="button" onclick="changeMonth('${step}', 1)">→</button>
                </div>
                <div class="calendar-grid"></div>
            `;

            const grid = container.querySelector('.calendar-grid');
            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sab'].forEach(d => {
                const h = document.createElement('div');
                h.className = 'day-header';
                h.textContent = d;
                grid.appendChild(h);
            });

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            for (let i = daysInPrevMonth - firstDay + 1; i <= daysInPrevMonth; i++) {
                const d = document.createElement('div');
                d.className = 'day other-month';
                d.textContent = i;
                grid.appendChild(d);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const d = document.createElement('div');
                d.className = 'day';
                d.textContent = i;
                const date = new Date(year, month, i);
                const today = new Date(); today.setHours(0,0,0,0);

                if (date < today) d.classList.add('other-month');
                else {
                    d.onclick = () => selectDate(step, date);
                    if (sel.date && date.toDateString() === sel.date.toDateString()) d.classList.add('selected');
                }
                grid.appendChild(d);
            }
        }

        function changeMonth(step, delta) {
            selections[step].currentMonth.setMonth(selections[step].currentMonth.getMonth() + delta);
            renderStepCalendar(step);
        }

        function selectDate(step, date) {
            selections[step].date = date;
            selections[step].start = null;
            selections[step].end = null;
            renderStepCalendar(step);
            renderTimeSlots(step);
            updateUI(step);
        }

        function renderTimeSlots(step) {
            const container = document.getElementById(`slots-${step}`);
            container.innerHTML = '';
            const sel = selections[step];
            if (!sel.date) return;

            for (let h = 8; h <= 22; h++) {
                [0, 30].forEach(m => {
                    if (h === 22 && m === 30) return;
                    const time = `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}`;
                    const slot = document.createElement('div');
                    slot.className = 'time-slot';
                    slot.textContent = time;

                    if (sel.start === time || sel.end === time) slot.classList.add('selected');

                    if (sel.start && !sel.end) {
                        const sVal = parseInt(sel.start.replace(':', ''));
                        const cVal = parseInt(time.replace(':', ''));
                        if (cVal <= sVal) {
                            slot.style.opacity = '0.3';
                            slot.style.cursor = 'not-allowed';
                        } else {
                            slot.onclick = () => selectTime(step, time);
                        }
                    } else {
                        slot.onclick = () => selectTime(step, time);
                    }
                    container.appendChild(slot);
                });
            }
        }

        function selectTime(step, time) {
            const sel = selections[step];
            if (!sel.start || (sel.start && sel.end)) {
                sel.start = time;
                sel.end = null;
                document.getElementById('modalOverlay').style.display = 'flex';
            } else {
                sel.end = time;
            }
            renderTimeSlots(step);
            updateUI(step);
        }

        function updateUI(step) {
            const sel = selections[step];
            const summary = document.getElementById(`summary-${step}`);
            const header = document.querySelector(`.accordion-item[data-step="${step}"] .accordion-header`);
            
            if (sel.date && sel.start && sel.end) {
                summary.innerHTML = `<strong>Selecionado:</strong> ${sel.date.toLocaleDateString('pt-BR')} das ${sel.start} às ${sel.end}`;
                summary.classList.add('show');
                header.classList.add('completed');
            } else {
                summary.classList.remove('show');
                header.classList.remove('completed');
            }
            
            const allDone = steps.every(s => selections[s].date && selections[s].start && selections[s].end);
            document.getElementById('submitBtn').disabled = !allDone;
        }

        function clearStep(step) {
            selections[step].date = null;
            selections[step].start = null;
            selections[step].end = null;
            renderStepCalendar(step);
            renderTimeSlots(step);
            updateUI(step);
        }

        document.getElementById('modalOkBtn').onclick = () => document.getElementById('modalOverlay').style.display = 'none';

        document.getElementById('agendamentoForm').onsubmit = async (e) => {
            e.preventDefault();
            const loading = document.getElementById('loading');
            const msg = document.getElementById('message');
            loading.classList.add('show');

            const payload = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                telefone: document.getElementById('telefone').value,
                evento: document.getElementById('evento').value,
                etapas: {}
            };

            steps.forEach(s => {
                payload.etapas[s] = {
                    data: selections[s].date.toISOString().split('T')[0],
                    horario: `${selections[s].start} às ${selections[s].end}`
                };
            });

            try {
                const res = await fetch('/api/agendar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const result = await res.json();
                if (res.ok) {
                    msg.textContent = '✅ Inscrição realizada com sucesso!';
                    msg.className = 'message success';
                    document.getElementById('agendamentoForm').reset();
                    steps.forEach(clearStep);
                } else {
                    msg.textContent = '❌ Erro: ' + result.error;
                    msg.className = 'message error';
                }
            } catch (err) {
                msg.textContent = '❌ Erro de conexão.';
                msg.className = 'message error';
            } finally {
                loading.classList.remove('show');
            }
        };

        // Inicializar primeira aba
        toggleStep('ensaio');
    </script>
</body>
</html>

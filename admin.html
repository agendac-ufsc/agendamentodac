<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Administrativo - DAC</title>
    <!-- Bibliotecas para geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f7f6;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }
        p.subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .list-container {
            margin-top: 20px;
        }
        .inscription-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }
        .inscription-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }
        .inscription-info {
            display: flex;
            flex-direction: column;
        }
        .inscription-title {
            font-weight: 600;
            color: #333;
            font-size: 16px;
        }
        .inscription-date {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }
        .btn-pdf {
            padding: 8px 16px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .btn-pdf:hover {
            background-color: #218838;
        }
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: #667eea;
        }
        .error {
            color: #d9534f;
            text-align: center;
            padding: 20px;
        }
        .refresh-btn {
            display: block;
            margin: 0 auto 20px;
            padding: 10px 20px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .refresh-btn:hover {
            background-color: #5a6fd6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Painel Administrativo - DAC</h1>
        <p class="subtitle">Segunda Etapa - Google Forms</p>
        <button class="refresh-btn" onclick="loadData()">Atualizar Lista</button>
        <div id="content">
            <div class="loading">Carregando inscrições...</div>
        </div>
    </div>

    <script>
        let allData = [];
        let headers = [];

        // Índices dos campos chave (serão determinados dinamicamente pelos headers)
        let idxTimestamp = 0;
        let idxEmail = 1;
        let idxNomeCompleto = -1;
        let idxRazaoSocial = -1;

        async function loadData() {
            const content = document.getElementById('content');
            content.innerHTML = '<div class="loading">Carregando inscrições...</div>';
            
            try {
                const response = await fetch('/api/admin/dados-forms');
                if (!response.ok) {
                    throw new Error('Erro ao buscar dados do servidor');
                }
                
                const data = await response.json();
                
                if (data.length <= 1) {
                    content.innerHTML = '<p style="text-align: center; padding: 20px;">Nenhuma inscrição encontrada.</p>';
                    return;
                }
                
                headers = data[0];
                allData = data.slice(1);

                // Determinar índices dos campos chave de forma dinâmica
                idxTimestamp = 0;
                idxEmail = -1;
                idxNomeCompleto = -1;
                idxRazaoSocial = -1;

                headers.forEach((h, i) => {
                    const lower = h.toLowerCase();
                    if (lower.includes('endereço de e-mail') || lower === 'e-mail' || lower === 'email') {
                        if (idxEmail === -1) idxEmail = i;
                    }
                    if (lower.includes('nome completo') && !lower.includes('representante')) {
                        if (idxNomeCompleto === -1) idxNomeCompleto = i;
                    }
                    if (lower.includes('razão social')) {
                        if (idxRazaoSocial === -1) idxRazaoSocial = i;
                    }
                });

                if (idxEmail === -1) idxEmail = 1;

                let html = '<div class="list-container">';
                
                allData.forEach((row, index) => {
                    // Montar identificador: preferir Nome Completo, depois Razão Social, depois e-mail
                    let identifier = '';
                    if (idxNomeCompleto >= 0 && row[idxNomeCompleto] && row[idxNomeCompleto].trim()) {
                        identifier = row[idxNomeCompleto].trim();
                    } else if (idxRazaoSocial >= 0 && row[idxRazaoSocial] && row[idxRazaoSocial].trim()) {
                        identifier = row[idxRazaoSocial].trim();
                    } else if (idxEmail >= 0 && row[idxEmail] && row[idxEmail].trim()) {
                        identifier = row[idxEmail].trim();
                    } else {
                        // Buscar qualquer valor não vazio nas primeiras colunas
                        for (let i = 1; i < Math.min(row.length, 6); i++) {
                            if (row[i] && row[i].trim()) { identifier = row[i].trim(); break; }
                        }
                        if (!identifier) identifier = 'Sem identificação';
                    }

                    const timestamp = row[idxTimestamp] || 'Data não disponível';
                    
                    html += `
                        <div class="inscription-item">
                            <div class="inscription-info">
                                <span class="inscription-title">Inscrição ${index + 1}: ${identifier}</span>
                                <span class="inscription-date">Enviado em: ${timestamp}</span>
                            </div>
                            <button class="btn-pdf" onclick="generatePDF(${index})">
                                📄 Gerar PDF
                            </button>
                        </div>
                    `;
                });
                
                html += '</div>';
                content.innerHTML = html;
                
            } catch (error) {
                content.innerHTML = `<div class="error">Erro: ${error.message}</div>`;
            }
        }

        function generatePDF(index) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const row = allData[index];

            // Montar identificador para o título do PDF
            let identifier = '';
            if (idxNomeCompleto >= 0 && row[idxNomeCompleto] && row[idxNomeCompleto].trim()) {
                identifier = row[idxNomeCompleto].trim();
            } else if (idxRazaoSocial >= 0 && row[idxRazaoSocial] && row[idxRazaoSocial].trim()) {
                identifier = row[idxRazaoSocial].trim();
            } else if (idxEmail >= 0 && row[idxEmail] && row[idxEmail].trim()) {
                identifier = row[idxEmail].trim();
            } else {
                identifier = 'Sem identificação';
            }

            // Configurações do PDF
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(40, 40, 40);
            doc.text("Ficha de Inscrição - DAC", 105, 20, { align: "center" });
            
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(`Inscrição #${index + 1} - ${identifier}`, 105, 28, { align: "center" });
            
            doc.setLineWidth(0.5);
            doc.line(20, 35, 190, 35);

            // Preparar dados para a tabela vertical, filtrando campos vazios
            const tableData = [];
            headers.forEach((header, i) => {
                const value = (row[i] !== undefined && row[i] !== null) ? row[i].toString().trim() : "";
                // Só adiciona se o valor não for vazio
                if (value && value !== "") {
                    tableData.push([header, value]);
                }
            });

            // Gerar tabela organizada
            doc.autoTable({
                startY: 40,
                head: [['Campo', 'Resposta']],
                body: tableData,
                theme: 'striped',
                headStyles: { fillColor: [102, 126, 234], textColor: 255, fontSize: 10 },
                bodyStyles: { fontSize: 9, cellPadding: 5 },
                columnStyles: {
                    0: { fontStyle: 'bold', cellWidth: 70 },
                    1: { cellWidth: 'auto' }
                },
                margin: { left: 20, right: 20 },
                didParseCell: function(data) {
                    if (data.column.index === 1) {
                        data.cell.styles.overflow = 'linebreak';
                    }
                }
            });

            // Rodapé
            const pageCount = doc.internal.getNumberOfPages();
            for(let i = 1; i <= pageCount; i++) {
                doc.setPage(i);
                doc.setFontSize(8);
                doc.setTextColor(150);
                doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 20, 285);
                doc.text(`Página ${i} de ${pageCount}`, 190, 285, { align: "right" });
            }

            // Abrir PDF em nova aba
            window.open(doc.output('bloburl'), '_blank');
        }

        // Carregar dados ao iniciar
        loadData();
    </script>
</body>
</html>
